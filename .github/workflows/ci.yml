name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install pinned tools
        uses: jdx/mise-action@v4
        with:
          cache: true

      - name: Select Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode_26.5.app
          xcodebuild -version

      - name: Verify tool versions
        run: |
          tuist version
          swiftformat --version
          swiftlint version

      - name: Install project dependencies
        run: tuist install

      - name: Check formatting
        run: make format-check

      - name: Run lint
        run: make lint

  tests:
    name: Tests (${{ matrix.scheme }})
    runs-on: macos-26
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        scheme:
          - AppMacros
          - DesignSystem
          - NetworkingCore
          - PresentationCore
          - RatesData
          - RatesDomain
          - RatesFeature
          - ForexApp

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install pinned tools
        uses: jdx/mise-action@v4
        with:
          cache: true

      - name: Select Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode_26.5.app
          xcodebuild -version

      - name: Install project dependencies
        run: tuist install

      - name: Run tests
        run: make test SCHEME=${{ matrix.scheme }}

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.scheme }}
          path: ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult
          if-no-files-found: ignore

  build:
    name: Build
    runs-on: macos-26
    timeout-minutes: 30
    needs:
      - quality
      - tests

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install pinned tools
        uses: jdx/mise-action@v4
        with:
          cache: true

      - name: Select Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode_26.5.app
          xcodebuild -version

      - name: Install project dependencies
        run: tuist install

      - name: Build application
        run: make build SCHEME=ForexApp
