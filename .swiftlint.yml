included:
  - ForexApp/Sources
  - ForexApp/Tests
  - Modules
excluded:
  - Derived
  - .build
  - Tuist/.build
strict: true
opt_in_rules:
  - closure_spacing
  - empty_count
  - empty_string
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - sorted_imports
  - vertical_parameter_alignment_on_call
line_length:
  warning: 100
  error: 120
  ignores_comments: true
  ignores_urls: true
function_body_length:
  warning: 40
  error: 60
type_body_length:
  warning: 200
  error: 300
file_length:
  warning: 400
  error: 600
identifier_name:
  excluded:
    - id
reporter: xcode
